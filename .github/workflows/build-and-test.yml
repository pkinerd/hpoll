name: Build & Test

on:
  push:
    branches:
      - "main"
      - "dev"
    paths-ignore:
      - .claude/**
      - "*.md"
      - docs/**
  pull_request:
    branches:
      - "main"
      - "dev"
    paths-ignore:
      - .claude/**
      - "*.md"
      - docs/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25 # v4.1.0
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: |
          dotnet build --no-restore -c Release \
            -p:BuildBranch="${{ github.head_ref || github.ref_name }}" \
            -p:BuildCommit="${{ github.sha }}" \
            -p:BuildNumber="${{ github.run_number }}" \
            -p:BuildRunId="${{ github.run_id }}" \
            -p:PullRequestNumber="${{ github.event.pull_request.number }}"

      - name: Test with coverage
        run: |
          dotnet test --no-build -c Release \
            --settings coverlet.runsettings \
            --collect:"XPlat Code Coverage" \
            --logger "junit;LogFilePath=TestResults/{assembly}.junit.xml" \
            --results-directory TestResults

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5.4.3
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: TestResults
          override_branch: ${{ github.head_ref || github.ref_name }}
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5.4.3
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: TestResults/*.junit.xml
          report_type: test_results
          override_branch: ${{ github.head_ref || github.ref_name }}
          fail_ci_if_error: false

      - name: Upload test reports
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        if: always()
        with:
          name: test-reports
          path: |
            TestResults/

  docker:
    name: Docker Build & Push
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/hpoll"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

          # Build tag list based on context
          TAGS="${IMAGE}:${SHORT_SHA},${IMAGE}:latest-any"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            TAGS="${TAGS},${IMAGE}:dev,${IMAGE}:pr-${{ github.event.pull_request.number }}"
          else
            # Branch build — sanitize branch name for use as a tag
            BRANCH_TAG=$(echo "${{ github.ref_name }}" | sed 's|[^a-zA-Z0-9._-]|-|g' | cut -c1-128)
            TAGS="${TAGS},${IMAGE}:${BRANCH_TAG}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BUILD_BRANCH=${{ github.head_ref || github.ref_name }}
            BUILD_COMMIT=${{ github.sha }}
            BUILD_NUMBER=${{ github.run_number }}
            BUILD_RUN_ID=${{ github.run_id }}
            PULL_REQUEST_NUMBER=${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-admin:
    name: Docker Build & Push (Admin)
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/hpoll-admin"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

          # Build tag list based on context
          TAGS="${IMAGE}:${SHORT_SHA},${IMAGE}:latest-any"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            TAGS="${TAGS},${IMAGE}:dev,${IMAGE}:pr-${{ github.event.pull_request.number }}"
          else
            # Branch build — sanitize branch name for use as a tag
            BRANCH_TAG=$(echo "${{ github.ref_name }}" | sed 's|[^a-zA-Z0-9._-]|-|g' | cut -c1-128)
            TAGS="${TAGS},${IMAGE}:${BRANCH_TAG}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          file: Dockerfile.admin
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BUILD_BRANCH=${{ github.head_ref || github.ref_name }}
            BUILD_COMMIT=${{ github.sha }}
            BUILD_NUMBER=${{ github.run_number }}
            BUILD_RUN_ID=${{ github.run_id }}
            PULL_REQUEST_NUMBER=${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin

  # ──────────────────────────────────────────────────────────────────────────
  # Update Latest Commit
  #
  # Writes the commit hash to the latest-ci orphan branch after successful
  # Docker pushes so external systems can discover the latest deployed commit.
  # ──────────────────────────────────────────────────────────────────────────
  update-latest:
    name: Update Latest Commit
    needs: [docker, docker-admin]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.2

      - name: Push commit hash to orphan branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git fetch origin latest-ci 2>/dev/null; then
            git checkout latest-ci
          else
            git checkout --orphan latest-ci
            git reset
          fi

          echo "${{ github.sha }}" > commit.txt
          git add commit.txt
          git commit -m "Latest commit: ${{ github.sha }}"
          git push origin latest-ci

  # ──────────────────────────────────────────────────────────────────────────
  # Push Build Logs
  #
  # Captures build/test results as folders on the single `build-logs` orphan
  # branch so the poll-build-logs Claude skill can monitor CI outcomes.
  # Each build becomes a folder: <run_number>-<run_id>-<timestamp>-<status>.
  # Only the 50 most recent builds are retained.
  # ──────────────────────────────────────────────────────────────────────────
  push-build-logs:
    name: Push Build Logs
    needs: [build-and-test, docker, docker-admin]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine build status
        id: status
        run: |
          BUILD_RESULT="${{ needs.build-and-test.result }}"
          DOCKER_RESULT="${{ needs.docker.result }}"
          DOCKER_ADMIN_RESULT="${{ needs.docker-admin.result }}"
          if [ "$BUILD_RESULT" = "success" ] \
            && [ "$DOCKER_RESULT" = "success" -o "$DOCKER_RESULT" = "skipped" ] \
            && [ "$DOCKER_ADMIN_RESULT" = "success" -o "$DOCKER_ADMIN_RESULT" = "skipped" ]; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Download test artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: test-reports
          path: test-reports
        continue-on-error: true

      - name: Generate log summary
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.triggering_actor }}
          RESULT: ${{ steps.status.outputs.result }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          mkdir -p logs
          {
            echo "# Build Log"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Run** | #${RUN_NUMBER} (attempt ${RUN_ATTEMPT}) |"
            echo "| **Run ID** | ${RUN_ID} |"
            echo "| **Result** | ${RESULT} |"
            echo "| **Commit** | ${SHA} |"
            echo "| **Ref** | ${REF} |"
            echo "| **Event** | ${EVENT_NAME} |"
            echo "| **Actor** | ${ACTOR} |"
            if [ -n "$PR_NUMBER" ]; then
              echo "| **PR** | #${PR_NUMBER}: ${PR_TITLE} |"
              echo "| **Branch** | ${HEAD_REF} |"
            fi
            echo ""
            if [ -d "test-reports" ]; then
              echo "## Artifacts"
              echo '```'
              find test-reports -type f | sort
              echo '```'
            fi
          } > logs/build-summary.md

      - name: Fetch build and test logs via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch job details
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            > logs/jobs.json 2>/dev/null || true

          # Download logs for completed jobs only (in-progress jobs return 404)
          if [ -f logs/jobs.json ]; then
            jq -r '.jobs[] | select(.status == "completed") | "\(.id) \(.name)"' logs/jobs.json 2>/dev/null \
              | while read -r job_id job_name; do
                  safe_name=$(echo "$job_name" | tr ' /' '-_' | tr '[:upper:]' '[:lower:]')
                  gh api "repos/${{ github.repository }}/actions/jobs/${job_id}/logs" \
                    > "logs/${safe_name}.log" 2>/dev/null || true
                done
          fi

      - name: Push logs to build-logs branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          STATUS="${{ steps.status.outputs.result }}"
          RUN_NUMBER="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"
          FOLDER="${RUN_NUMBER}-${RUN_ID}-${TIMESTAMP}-${STATUS}"
          REMOTE_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # Prepare the new build folder
          mkdir -p "${FOLDER}"
          cp logs/* "${FOLDER}/"
          if [ -d "test-reports" ]; then
            cp -r test-reports "${FOLDER}/test-reports"
          fi
          rm -rf logs test-reports

          git init -b build-logs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "${REMOTE_URL}"

          # Delete any old-format build-logs/* branches that conflict with the
          # build-logs branch namespace (git refs can't be both a leaf and a
          # directory, e.g. build-logs and build-logs/296-... can't coexist).
          gh api "repos/${{ github.repository }}/git/matching-refs/heads/build-logs/" \
            --jq '.[].ref' 2>/dev/null \
            | while read -r ref; do
                short="${ref#refs/}"
                echo "Deleting old-format branch: $short"
                gh api -X DELETE "repos/${{ github.repository }}/git/refs/${short}" || true
              done

          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            # Reset to orphan state so each attempt starts clean
            git checkout --orphan build-logs
            git rm -r --cached . 2>/dev/null || true

            # Fetch existing branch using blobless filter (only tree/commit objects)
            if git fetch origin build-logs --depth=1 --filter=blob:none 2>/dev/null; then
              git reset FETCH_HEAD

              # Prune old folders — keep 49 existing + 1 new = 50
              FOLDERS=$(git ls-tree HEAD --name-only | sort -t- -k1 -n)
              if [ -n "$FOLDERS" ]; then
                COUNT=$(echo "$FOLDERS" | wc -l)
                KEEP=49
                if [ "$COUNT" -gt "$KEEP" ]; then
                  echo "$FOLDERS" | head -n $((COUNT - KEEP)) | while read -r old_folder; do
                    echo "Pruning old build folder: $old_folder"
                    git rm -r --cached "$old_folder"
                  done
                fi
              fi
            else
              echo "Branch does not exist yet — creating fresh"
            fi

            git add "${FOLDER}/"
            git commit -m "Build #${RUN_NUMBER} (${STATUS})"

            if git push -u origin build-logs; then
              echo "Successfully pushed build logs (attempt $attempt)"
              break
            fi

            if [ "$attempt" -eq "$MAX_RETRIES" ]; then
              echo "::warning::Failed to push build logs after $MAX_RETRIES attempts"
              exit 0
            fi

            echo "Push failed (attempt $attempt/$MAX_RETRIES), retrying..."
            sleep $((attempt * 2))
          done
